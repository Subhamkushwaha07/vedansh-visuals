<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Delete Test Review — Vedansh Visuals</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; gap: 20px; }
    button { padding: 14px 32px; background: #c9a84c; color: #000; font-size: 1rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #log { font-size: 0.9rem; color: #aaa; max-width: 560px; text-align: center; line-height: 1.8; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Delete All Test Reviews from Firestore</h2>
  <p style="color:#aaa;max-width:480px;text-align:center">
    Click the button below. It will delete every document in the <strong>reviews</strong> collection and log the result.
  </p>
  <button id="btn">Delete All Reviews</button>
  <pre id="log">Waiting…</pre>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const btn = document.getElementById('btn');
      const log = document.getElementById('log');
      btn.disabled = true;
      log.textContent = 'Fetching reviews…';

      try {
        const snapshot = await db.collection('reviews').get();
        if (snapshot.empty) {
          log.textContent = '✓ No reviews found in Firestore. Collection is already empty.';
          return;
        }

        const batch = db.batch();
        snapshot.forEach(doc => batch.delete(doc.ref));
        await batch.commit();

        log.textContent = `✓ Done. Deleted ${snapshot.size} review(s) from Firestore.\n\nYou can now close this page and delete this file.`;
      } catch (err) {
        log.textContent = '✗ Error: ' + err.message;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
