<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Vedansh Visuals</title>
    <meta name="description" content="The page you are looking for does not exist. Return to Vedansh Visuals — wedding photography, cinematography and video editing in West Bengal." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://vedansh-visuals.netlify.app/" />
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/ovb0un2m/image/upload/Birthday_Logo_iqjkxl.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --black: #0a0a0a;
        --white: #f4f4f0;
        --gold:  #c9a84c;
        --gold-lt: #ddb96a;
        --gray: #7a7a7a;
        --font-serif: 'Playfair Display', Georgia, serif;
        --font-sans:  'Nunito Sans', system-ui, sans-serif;
      }
      html { font-size: 16px; }
      body {
        font-family: var(--font-sans);
        background: var(--black);
        color: var(--white);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
        -webkit-font-smoothing: antialiased;
      }
      .err-wrap { max-width: 560px; width: 100%; }
      .err-code {
        font-family: var(--font-serif);
        font-size: clamp(6rem, 20vw, 10rem);
        font-weight: 400;
        line-height: 1;
        color: transparent;
        -webkit-text-stroke: 2px var(--gold);
        letter-spacing: -0.04em;
        margin-bottom: 8px;
        opacity: 0.85;
      }
      .err-divider {
        width: 60px; height: 2px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        border-radius: 2px;
        margin: 0 auto 28px;
      }
      .err-title {
        font-family: var(--font-serif);
        font-size: clamp(1.5rem, 4vw, 2.2rem);
        font-weight: 400;
        color: var(--white);
        margin-bottom: 16px;
        line-height: 1.25;
      }
      .err-desc {
        font-size: 0.95rem;
        color: rgba(244,244,240,.6);
        line-height: 1.8;
        margin-bottom: 40px;
      }
      .err-btns {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-block;
        padding: 13px 32px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 4px;
        text-decoration: none;
        transition: all 0.3s ease;
        font-family: var(--font-sans);
      }
      .btn-gold {
        background: var(--gold);
        color: var(--black);
        border: 1px solid var(--gold);
      }
      .btn-gold:hover {
        background: var(--gold-lt);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(201,168,76,.35);
      }
      .btn-outline {
        border: 1px solid rgba(244,244,240,.35);
        color: var(--white);
      }
      .btn-outline:hover {
        border-color: var(--gold);
        color: var(--gold);
        transform: translateY(-2px);
      }
      .err-logo {
        font-family: var(--font-serif);
        font-size: 1.1rem;
        color: rgba(244,244,240,.4);
        margin-top: 56px;
        letter-spacing: 0.5px;
        text-decoration: none;
        transition: color 0.3s ease;
      }
      .err-logo span { color: var(--gold); opacity: 0.7; }
      .err-logo:hover { color: var(--white); }
      @media (max-width: 480px) {
        .err-btns { flex-direction: column; align-items: center; }
        .btn { width: 100%; max-width: 240px; text-align: center; }
      }
    </style>
  </head>
  <body>
    <main class="err-wrap" role="main">
      <p class="err-code" aria-label="Error 404">404</p>
      <div class="err-divider" aria-hidden="true"></div>
      <h1 class="err-title">Page Not Found</h1>
      <p class="err-desc">
        The page you're looking for doesn't exist or has been moved.<br />
        Let's get you back to capturing beautiful moments.
      </p>
      <nav class="err-btns" aria-label="Recovery navigation">
        <a href="/" class="btn btn-gold">Go to Homepage</a>
        <a href="/#portfolio" class="btn btn-outline">View Portfolio</a>
      </nav>
      <a href="/" class="err-logo" aria-label="Vedansh Visuals — Home">
        Vedansh <span>Visuals</span>
      </a>
    </main>
  </body>
</html>
